name: Build

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chip: [STM32F407VG]
        template:
          - blink
          - i2c-scan
          - freertos-blink
          - mpu6050-uart
          - oled-display-test
          - w25q32-flash-test
          - imu-flash-oled-demo

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install stmtool
        run: pip install ./tools/stmtool

      - name: Create project
        run: |
          stmtool project create "ci-${{ matrix.template }}" \
            --chip ${{ matrix.chip }} \
            --template ${{ matrix.template }}
        env:
          STMSDK_PATH: ${{ github.workspace }}

      - name: Build
        run: |
          cd "ci-${{ matrix.template }}"
          stmtool build --native
        env:
          STMSDK_PATH: ${{ github.workspace }}

      - name: Binary size
        run: |
          cd "ci-${{ matrix.template }}"
          arm-none-eabi-size build/*.elf
