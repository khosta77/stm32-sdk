name: Build

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chip: [STM32F407VG]
        template:
          - bare-metal/blink
          - bare-metal/i2c-scan
          - freertos/blink
          - freertos/mpu6050-uart
          - freertos/oled-display-test
          - freertos/w25q32-flash-test
          - freertos/imu-flash-oled-demo

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install stmtool
        run: pip install ./tools/stmtool

      - name: Compute slug
        id: slug
        run: echo "value=$(echo '${{ matrix.template }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Create project
        run: |
          stmtool project create "ci-${{ steps.slug.outputs.value }}" \
            --chip ${{ matrix.chip }} \
            --template ${{ matrix.template }}
        env:
          STMSDK_PATH: ${{ github.workspace }}

      - name: Build
        run: |
          cd "ci-${{ steps.slug.outputs.value }}"
          stmtool build --native
        env:
          STMSDK_PATH: ${{ github.workspace }}

      - name: Binary size
        run: |
          cd "ci-${{ steps.slug.outputs.value }}"
          arm-none-eabi-size build/*.elf
