name: stmtool CI

on:
  push:
    branches: [develop]
    paths:
      - "tools/stmtool/**"
      - ".github/workflows/stmtool.yml"
  pull_request:
    branches: [develop]
    paths:
      - "tools/stmtool/**"
      - ".github/workflows/stmtool.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/stmtool
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pipx
        run: python -m pip install --upgrade pip pipx

      - name: Install Poetry
        run: pipx install poetry

      - name: Add poetry-dynamic-versioning plugin
        run: pipx inject poetry "poetry-dynamic-versioning[plugin]"

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: poe ci
        run: poetry run poe ci
